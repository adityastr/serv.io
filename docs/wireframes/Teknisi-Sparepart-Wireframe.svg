<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="1440" height="1024" style="background-color: #FAFAFA; font-family: 'Inter', system-ui, sans-serif;">
  <!-- Sidebar -->
  <rect x="0" y="0" width="280" height="1024" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2" />
  
  <rect x="24" y="24" width="32" height="32" rx="8" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1" />
  <path d="M34 40l8 -8M38 44l4 -4" stroke="#737373" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <text x="70" y="46" font-size="20" font-weight="900" fill="#171717" letter-spacing="-0.5">Serv.io</text>
  <text x="160" y="43" font-size="10" font-weight="800" fill="#737373" letter-spacing="1">TEKNISI</text>

  <text x="28" y="94" font-size="11" font-weight="bold" fill="#A3A3A3" letter-spacing="1">MENU UTAMA</text>

  <!-- 1. Dashboard -->
  <rect x="32" y="120" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="135" font-size="14" font-weight="500" fill="#525252">Dashboard</text>

  <!-- 2. Tiket Servis -->
  <rect x="32" y="172" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="187" font-size="14" font-weight="500" fill="#525252">Tiket Servis</text>

  <!-- 3. Sparepart (ACTIVE) -->
  <rect x="16" y="212" width="248" height="44" rx="12" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1" />
  <rect x="32" y="224" width="20" height="20" fill="#737373" rx="4" />
  <text x="64" y="239" font-size="14" font-weight="700" fill="#737373">Sparepart</text>

  <!-- Topbar -->
  <rect x="280" y="0" width="1160" height="80" fill="#FFFFFF" stroke="#F5F5F5" stroke-width="2" />
  <text x="320" y="48" font-size="22" font-weight="800" fill="#171717">Data Sparepart</text>
  <circle cx="1360" cy="40" r="20" fill="#F5F5F5" />
  <text x="1360" y="45" font-size="14" font-weight="bold" fill="#737373" text-anchor="middle">T</text>
  <text x="1240" y="45" font-size="14" font-weight="600" fill="#525252">Budi (Teknisi)</text>

  <!-- Search & Action -->
  <rect x="320" y="112" width="320" height="48" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
  <text x="360" y="141" font-size="14" fill="#A3A3A3">Cari inventaris...</text>

  <!-- Teknisi only has request button -->
  <rect x="1160" y="112" width="240" height="48" rx="12" fill="#171717" />
  <text x="1280" y="141" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Request Ambil Sparepart</text>

  <!-- Data Table -->
  <rect x="320" y="192" width="1080" height="600" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
  
  <rect x="320" y="192" width="1080" height="48" fill="#FAFAFA" stroke="#F5F5F5" stroke-width="1" />
  <text x="344" y="221" font-size="12" font-weight="800" fill="#737373">KODE</text>
  <text x="440" y="221" font-size="12" font-weight="800" fill="#737373">NAMA BARANG</text>
  <text x="700" y="221" font-size="12" font-weight="800" fill="#737373">LOKASI RAK</text>
  <text x="900" y="221" font-size="12" font-weight="800" fill="#737373">SISA STOK</text>
  <text x="1300" y="221" font-size="12" font-weight="800" fill="#737373">STATUS</text>

  <!-- Row 1 -->
  <rect x="320" y="240" width="1080" height="64" fill="#FFFFFF" stroke="#FAFAFA" stroke-width="2" />
  <text x="344" y="277" font-size="13" font-weight="700" fill="#737373" font-family="monospace">SP-001</text>
  <text x="440" y="277" font-size="14" font-weight="700" fill="#171717">LCD Lenovo Legion 15.6"</text>
  <text x="700" y="277" font-size="13" font-weight="500" fill="#404040">Rak A-12</text>
  <rect x="900" y="258" width="48" height="28" rx="6" fill="#E5E5E5" />
  <text x="924" y="277" font-size="13" font-weight="800" fill="#525252" text-anchor="middle">12</text>
  <text x="1300" y="277" font-size="13" font-weight="800" fill="#525252">Tersedia</text>

  <!-- Row 2 -->
  <rect x="320" y="304" width="1080" height="64" fill="#FFFFFF" stroke="#FAFAFA" stroke-width="2" />
  <text x="344" y="341" font-size="13" font-weight="700" fill="#737373" font-family="monospace">SP-002</text>
  <text x="440" y="341" font-size="14" font-weight="700" fill="#171717">Printhead Canon L3110</text>
  <text x="700" y="341" font-size="13" font-weight="500" fill="#404040">Rak B-04</text>
  <rect x="900" y="322" width="48" height="28" rx="6" fill="#F5F5F5" />
  <text x="924" y="341" font-size="13" font-weight="800" fill="#404040" text-anchor="middle">0</text>
  <text x="1300" y="341" font-size="13" font-weight="800" fill="#404040">Habis</text>

  <!-- Row 3 -->
  <rect x="320" y="368" width="1080" height="64" fill="#FFFFFF" stroke="#FAFAFA" stroke-width="2" />
  <text x="344" y="405" font-size="13" font-weight="700" fill="#737373" font-family="monospace">SP-003</text>
  <text x="440" y="405" font-size="14" font-weight="700" fill="#171717">Thermal Paste MX-4</text>
  <text x="700" y="405" font-size="13" font-weight="500" fill="#404040">Rak C-01</text>
  <rect x="900" y="386" width="48" height="28" rx="6" fill="#E5E5E5" />
  <text x="924" y="405" font-size="13" font-weight="800" fill="#404040" text-anchor="middle">1</text>
  <text x="1300" y="405" font-size="13" font-weight="800" fill="#404040">Menipis</text>
</svg>
