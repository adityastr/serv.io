<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="1440" height="1024" style="background-color: #FAFAFA; font-family: 'Inter', system-ui, sans-serif;">
  <!-- Sidebar -->
  <rect x="0" y="0" width="280" height="1024" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2" />
  
  <rect x="24" y="24" width="32" height="32" rx="8" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1" />
  <path d="M34 40l8 -8M38 44l4 -4" stroke="#737373" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  <text x="70" y="46" font-size="20" font-weight="900" fill="#171717" letter-spacing="-0.5">Serv.io</text>

  <text x="28" y="94" font-size="11" font-weight="bold" fill="#A3A3A3" letter-spacing="1">MENU UTAMA</text>

  <!-- 1. Dashboard -->
  <rect x="32" y="120" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="135" font-size="14" font-weight="500" fill="#525252">Dashboard</text>

  <!-- 2. Customer -->
  <rect x="32" y="172" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="187" font-size="14" font-weight="500" fill="#525252">Customer</text>

  <!-- 3. Perangkat -->
  <rect x="32" y="224" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="239" font-size="14" font-weight="500" fill="#525252">Perangkat</text>

  <!-- 4. Tiket Servis (ACTIVE) -->
  <rect x="16" y="264" width="248" height="44" rx="12" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1" />
  <rect x="32" y="276" width="20" height="20" fill="#737373" rx="4" />
  <text x="64" y="291" font-size="14" font-weight="700" fill="#737373">Tiket Servis</text>

  <!-- 5. Sparepart -->
  <rect x="32" y="328" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="343" font-size="14" font-weight="500" fill="#525252">Sparepart</text>

  <!-- 6. Invoice -->
  <rect x="32" y="380" width="20" height="20" fill="#A3A3A3" rx="4" />
  <text x="64" y="395" font-size="14" font-weight="500" fill="#525252">Invoice</text>

  <!-- Topbar -->
  <rect x="280" y="0" width="1160" height="80" fill="#FFFFFF" stroke="#F5F5F5" stroke-width="2" />
  <text x="320" y="48" font-size="22" font-weight="800" fill="#171717">Edit Tiket - SRV-001</text>
  <circle cx="1360" cy="40" r="20" fill="#F5F5F5" />
  <text x="1360" y="45" font-size="14" font-weight="bold" fill="#737373" text-anchor="middle">A</text>
  <text x="1240" y="45" font-size="14" font-weight="600" fill="#525252">Admin User</text>

  <!-- Content Area -->
  <g transform="translate(320, 112)">
    <rect width="1080" height="880" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    
    <!-- Left Column: Informasi Tiket -->
    <text x="40" y="40" font-size="16" font-weight="800" fill="#171717">Informasi Dasar &amp; Status</text>
    
    <text x="40" y="80" font-size="13" font-weight="700" fill="#737373">STATUS SAAT INI</text>
    <rect x="40" y="92" width="480" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    <rect x="52" y="102" width="160" height="28" rx="6" fill="#E5E5E5" />
    <text x="132" y="121" font-size="13" font-weight="800" fill="#525252" text-anchor="middle">DALAM PERBAIKAN</text>
    <path d="M490 110 l6 6 l6 -6" stroke="#A3A3A3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <text x="40" y="172" font-size="13" font-weight="700" fill="#737373">KELUHAN PELANGGAN</text>
    <rect x="40" y="184" width="480" height="80" rx="8" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="56" y="208" font-size="14" font-weight="500" fill="#404040">Layar laptop berkedip saat membuka aplikasi berat.</text>

    <text x="40" y="296" font-size="13" font-weight="700" fill="#737373">KELENGKAPAN PERANGKAT</text>
    <rect x="40" y="308" width="480" height="48" rx="8" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="56" y="337" font-size="14" font-weight="500" fill="#404040">Tas laptop dan kabel charger orisinal.</text>

    <!-- Right Column: Diagnosis -->
    <text x="560" y="40" font-size="16" font-weight="800" fill="#171717">Diagnosis &amp; Estimasi</text>

    <text x="560" y="80" font-size="13" font-weight="700" fill="#737373">MASALAH DITEMUKAN</text>
    <rect x="560" y="92" width="480" height="64" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="576" y="116" font-size="14" font-weight="500" fill="#404040">Fleksibel LCD bermasalah / putus parsial.</text>

    <text x="560" y="188" font-size="13" font-weight="700" fill="#737373">SOLUSI / TINDAKAN</text>
    <rect x="560" y="200" width="480" height="64" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="576" y="224" font-size="14" font-weight="500" fill="#404040">Penggantian kabel fleksibel dengan sparepart baru.</text>

    <text x="560" y="296" font-size="13" font-weight="700" fill="#737373">ESTIMASI BIAYA (Rp)</text>
    <rect x="560" y="308" width="480" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="576" y="337" font-size="14" font-weight="600" fill="#171717">450.000</text>

    <!-- Divider -->
    <line x1="40" y1="384" x2="1040" y2="384" stroke="#F5F5F5" stroke-width="2" />

    <!-- Log Perbaikan -->
    <text x="40" y="424" font-size="16" font-weight="800" fill="#171717">Riwayat / Log Aktivitas Perbaikan</text>

    <!-- Add Log Input -->
    <rect x="40" y="444" width="820" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="56" y="473" font-size="14" fill="#A3A3A3">Tulis update aktivitas terbaru...</text>
    
    <rect x="880" y="444" width="160" height="48" rx="8" fill="#737373" />
    <text x="960" y="473" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">+ Tambah Log</text>

    <!-- Log List -->
    <rect x="40" y="512" width="1000" height="80" rx="12" fill="#FAFAFA" stroke="#F5F5F5" stroke-width="2" />
    <text x="60" y="540" font-size="12" font-weight="800" fill="#737373">20 JUNI 2026, 14:00</text>
    <text x="60" y="564" font-size="14" font-weight="500" fill="#171717">Mulai proses pembongkaran perangkat untuk mengecek fleksibel LCD.</text>

    <rect x="40" y="608" width="1000" height="80" rx="12" fill="#FAFAFA" stroke="#F5F5F5" stroke-width="2" />
    <text x="60" y="636" font-size="12" font-weight="800" fill="#737373">20 JUNI 2026, 10:30</text>
    <text x="60" y="660" font-size="14" font-weight="500" fill="#171717">Pelanggan telah menyetujui estimasi biaya dan perbaikan dilanjutkan.</text>

    <!-- Divider -->
    <line x1="40" y1="780" x2="1040" y2="780" stroke="#F5F5F5" stroke-width="2" />

    <!-- Action Buttons -->
    <rect x="800" y="800" width="100" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
    <text x="850" y="829" font-size="14" font-weight="700" fill="#525252" text-anchor="middle">Batal</text>
    
    <rect x="920" y="800" width="120" height="48" rx="8" fill="#737373" />
    <text x="980" y="829" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Simpan Tiket</text>
  </g>
</svg>
