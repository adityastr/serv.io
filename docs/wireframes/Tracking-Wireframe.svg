<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="1440" height="1024" style="background-color: #FAFAFA; font-family: 'Inter', system-ui, sans-serif;">
  <!-- Background -->
  <rect width="1440" height="1024" fill="#FAFAFA" />

  <!-- Header -->
  <rect width="1440" height="64" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="2" />
  <rect x="48" y="16" width="32" height="32" rx="6" fill="#525252" />
  <!-- Logo Icon -->
  <path d="M58 32l12 -12M62 36l8 -8" stroke="#FFFFFF" stroke-width="2" />
  <text x="92" y="38" font-size="20" font-weight="bold" fill="#171717">Serv.io (Wireframe)</text>

  <!-- Hero Section -->
  <text x="720" y="160" font-size="36" font-weight="900" fill="#171717" text-anchor="middle">Lacak Perbaikan Anda</text>
  <text x="720" y="200" font-size="16" font-weight="normal" fill="#737373" text-anchor="middle">Masukkan nomor telepon atau nomor tiket untuk melihat status terkini perangkat Anda.</text>

  <!-- Search Card -->
  <g transform="translate(336, 260)">
    <!-- Card Background -->
    <rect width="768" height="340" rx="16" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="2" />
    
    <!-- Tabs Container -->
    <rect x="32" y="32" width="704" height="48" rx="8" fill="#F5F5F5" />
    
    <!-- Active Tab (Nomor Tiket) -->
    <rect x="36" y="36" width="348" height="40" rx="6" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" />
    <text x="210" y="61" font-size="14" font-weight="bold" fill="#171717" text-anchor="middle">Nomor Tiket</text>
    
    <!-- Inactive Tab (Nomor Telepon) -->
    <text x="562" y="61" font-size="14" font-weight="bold" fill="#737373" text-anchor="middle">Nomor Telepon</text>

    <!-- Input Area -->
    <text x="32" y="130" font-size="14" font-weight="600" fill="#404040">Nomor Tiket Servis</text>
    <rect x="32" y="144" width="704" height="48" rx="8" fill="#FAFAFA" stroke="#A3A3A3" stroke-width="1.5" />
    <text x="50" y="174" font-size="14" fill="#A3A3A3" font-family="monospace">Contoh: SRV-2024-001</text>

    <!-- Button -->
    <rect x="32" y="220" width="704" height="48" rx="8" fill="#525252" />
    <text x="384" y="250" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Lacak Servis</text>

    <!-- Error/Alert Placeholder -->
    <rect x="32" y="284" width="704" height="36" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="4" />
    <text x="384" y="306" font-size="12" font-weight="bold" fill="#404040" text-anchor="middle">Informasi Error / Validasi akan muncul di sini (Optional)</text>
  </g>

  <!-- Results Section -->
  <text x="336" y="660" font-size="18" font-weight="bold" fill="#171717">Hasil Pencarian (1 Tiket Ditemukan)</text>

  <!-- Result Card (Mid-Fi) -->
  <g transform="translate(336, 680)">
    <!-- Card Border -->
    <rect width="768" height="280" rx="12" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="2" />
    
    <!-- Card Header -->
    <rect width="768" height="72" rx="12" fill="#FAFAFA" />
    <line x1="0" y1="72" x2="768" y2="72" stroke="#D4D4D4" stroke-width="2" />
    
    <text x="24" y="34" font-size="16" font-weight="bold" fill="#171717" font-family="monospace">SRV-2024-001</text>
    <text x="24" y="56" font-size="12" fill="#737373">Tanggal Masuk: 20 Juni 2026</text>
    <text x="240" y="46" font-size="16" font-weight="600" fill="#404040">Laptop Lenovo Legion 5</text>
    
    <rect x="620" y="24" width="124" height="28" rx="14" fill="#E5E5E5" />
    <text x="682" y="42" font-size="11" font-weight="bold" fill="#404040" text-anchor="middle">DALAM PERBAIKAN</text>

    <!-- Card Content -->
    <!-- Keluhan -->
    <text x="24" y="104" font-size="12" font-weight="bold" fill="#737373" text-transform="uppercase">Keluhan Pelanggan</text>
    <rect x="24" y="112" width="350" height="48" rx="6" fill="#F5F5F5" />
    <text x="36" y="132" font-size="13" fill="#171717">Layar tiba-tiba mati total</text>

    <!-- Kelengkapan -->
    <text x="394" y="104" font-size="12" font-weight="bold" fill="#737373" text-transform="uppercase">Kelengkapan Perangkat</text>
    <rect x="394" y="112" width="350" height="48" rx="6" fill="#F5F5F5" />
    <text x="406" y="132" font-size="13" fill="#171717">Tas, Charger, Mouse</text>

    <!-- Foto Kondisi Placeholder -->
    <text x="24" y="190" font-size="12" font-weight="bold" fill="#737373" text-transform="uppercase">Foto Kondisi Awal</text>
    <rect x="24" y="200" width="60" height="60" rx="4" fill="#E5E5E5" stroke="#A3A3A3" stroke-width="1" />
    <line x1="24" y1="200" x2="84" y2="260" stroke="#A3A3A3" />
    <line x1="84" y1="200" x2="24" y2="260" stroke="#A3A3A3" />

    <rect x="92" y="200" width="60" height="60" rx="4" fill="#E5E5E5" stroke="#A3A3A3" stroke-width="1" />
    <line x1="92" y1="200" x2="152" y2="260" stroke="#A3A3A3" />
    <line x1="152" y1="200" x2="92" y2="260" stroke="#A3A3A3" />

    <!-- History Expand Placeholder -->
    <text x="394" y="190" font-size="12" font-weight="bold" fill="#737373" text-transform="uppercase">Riwayat Perbaikan</text>
    <rect x="394" y="200" width="350" height="60" rx="6" fill="#FAFAFA" stroke="#D4D4D4" stroke-dasharray="4" stroke-width="1" />
    <text x="569" y="235" font-size="13" fill="#737373" text-anchor="middle">12 Log Aktivitas (Klik untuk membuka)</text>
  </g>
</svg>
